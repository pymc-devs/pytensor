name: PyPI
on:
  push:
    branches:
      - main
      - v2
  pull_request:
    branches:
      - main
      - v2
  release:
    types: [published]

# Cancels all previous workflow runs for pull requests that have not completed.
concurrency:
  # The concurrency group contains the workflow name and the branch name for pull requests
  # or the commit hash for any other events.
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.set_should_run.outputs.should_run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          filters: |
            any_changed:
              - '.github/workflows/pypi.yml'
              - 'pyproject.toml'
              - 'setup.py'
              - 'pytensor/_version.py'
              - 'pytensor/scan_perform.pyx'
              - 'pytensor/scan_perform_ext.py'
      - name: Set should_run output
        id: set_should_run
        run: |
          if [[ "${{ github.event_name == 'release' || 
                github.ref == 'refs/heads/main' ||
                (
                  github.event_name == 'pull_request'
                  && steps.filter.outputs.any_changed == 'true'
                )
              }}" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  # The job to build precompiled pypi wheels.
  make_sdist:
    name: Make SDist
    needs: check_changes
    # Run if it's a release or if relevant files changed on main
    if: |
      needs.check_changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      # write id-token and attestations are required to attest build provenance
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Build SDist
        run: pipx run build --sdist

      - name: Attest GitHub build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        # Don't attest from forks
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          subject-path: dist/*.tar.gz

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz

  run_checks:
    name: Build & inspect our package.
    needs: check_changes
    # Run if it's a release or if relevant files changed on main
    if: |
      needs.check_changes.outputs.should_run == 'true'
    # Note: the resulting builds are not actually published.
    # This is purely for additional testing and diagnostic purposes.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0

  build_wheels:
    name: Build wheels for ${{ matrix.platform }}
    needs: check_changes
    # Run if it's a release or if relevant files changed on main
    if: |
      needs.check_changes.outputs.should_run == 'true'
    runs-on: ${{ matrix.platform }}
    permissions:
      # write id-token and attestations are required to attest build provenance
      id-token: write
      attestations: write
    strategy:
      matrix:
        platform:
          - macos-latest
          - windows-latest
          - ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1

      - name: Attest GitHub build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        # Don't attest from forks
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          subject-path: ./wheelhouse/*.whl

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.platform }}
          path: ./wheelhouse/*.whl

  build_pyodide_wheel:
    name: Build Pyodide (WASM) wheel
    needs: check_changes
    # Run if it's a release or if relevant files changed on main
    if: |
      needs.check_changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      # write id-token and attestations are required to attest build provenance
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Get Emscripten version for pyodide-build
        id: emscripten
        run: |
          pip install pyodide-build>=0.29.2
          echo "version=$(pyodide config get emscripten_version)" >> $GITHUB_OUTPUT

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: ${{ steps.emscripten.outputs.version }}

      - name: Install project with pyodide extra
        run: pip install -e ".[pyodide]"

      - name: Build Pyodide wheel
        run: pyodide build

      - name: Attest GitHub build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        # Don't attest from forks
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          subject-path: dist/*wasm32.whl

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pyodide_wheel
          path: dist/*wasm32.whl

  check_dist:
    name: Check dist
    needs: [check_changes, make_sdist, build_wheels]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: sdist
          path: dist

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Check SDist
        run: |
          mkdir -p test-sdist
          cd test-sdist
          python -m venv venv-sdist
          venv-sdist/bin/python -m pip install ../dist/pytensor-*.tar.gz
          # check import
          venv-sdist/bin/python -c "import pytensor;print(pytensor.__version__)"
          # check import cython module
          venv-sdist/bin/python -c 'from pytensor.scan import scan_perform; print(scan_perform.get_version())'

      - run: pipx run twine check --strict dist/*

  upload_pyodide_to_release:
    name: Upload Pyodide wheel to GitHub Release
    needs: [build_pyodide_wheel]
    runs-on: ubuntu-latest
    if: github.repository_owner == 'pymc-devs' && github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: pyodide_wheel
          path: dist

      - name: Upload Pyodide wheel to Release
        run: gh release upload "$RELEASE_TAG" dist/*.whl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}

  upload_pypi:
    name: Upload to PyPI on release
    # Use the `release` GitHub environment to protect the Trusted Publishing (OIDC)
    # workflow by requiring signoff from a maintainer.
    environment: release
    permissions:
      # write id-token is required for trusted publishing (OIDC)
      id-token: write
    needs: [check_dist]
    runs-on: ubuntu-latest
    # Don't publish from forks
    if: github.repository_owner == 'pymc-devs' && github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: sdist
          path: dist

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        # Implicitly attests that the packages were uploaded in the context of this workflow.
